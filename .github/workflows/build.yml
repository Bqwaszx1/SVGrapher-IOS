 name: Build iOS IPA
  on: [push]
  jobs:
    build:
      runs-on: macos-latest
      steps:
         - uses: actions/checkout@v4
         - name: Capacitor Sync
          run: |
            npm install @capacitor/core @capacitor/cli @capacitor/ios
            npx cap init SVGrapher com.svgrapher.app --web-dir .
            npx cap add ios
            npx cap sync ios
         - name: Build IPA (Unsigned)
          run: |
            xcodebuild -workspace ios/App/App.xcworkspace \
                       -scheme App \
                       -configuration Release \
                       -sdk iphoneos \
                       -derivedDataPath build \
                       CODE_SIGN_IDENTITY="" \
                       CODE_SIGNING_REQUIRED=NO \
                       CODE_SIGNING_ALLOWED=NO
         - name: Archive IPA
          run: |
            mkdir -p build/IPA
            cp -r build/Build/Products/Release-iphoneos/App.app build/IPA/
            cd build/IPA
            zip -r SVGrapher.ipa App.app
         - name: Upload Artifact
          uses: actions/upload-artifact@v4
          with:
            name: SVGrapher-IPA
            path: build/IPA/SVGrapher.ipa
